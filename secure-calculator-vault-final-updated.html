<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Calculator Vault</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;font-family:Inter,system-ui,Segoe UI,sans-serif;background:#050812;color:white;overflow-x:hidden}.bg{position:fixed;inset:0;background:radial-gradient(circle at 20% 10%,#143cff55,transparent 28%),radial-gradient(circle at 80% 20%,#00ffbf44,transparent 30%),radial-gradient(circle at 50% 90%,#8b5cf644,transparent 32%),#050812;z-index:-3}.bg:before{content:"";position:absolute;inset:0;background-image:linear-gradient(#ffffff08 1px,transparent 1px),linear-gradient(90deg,#ffffff08 1px,transparent 1px);background-size:38px 38px;mask-image:linear-gradient(to bottom,#000,transparent)}.orb{position:fixed;width:180px;height:180px;border-radius:50%;filter:blur(60px);opacity:.6;animation:float 8s infinite alternate;z-index:-2}.o1{background:#00ffc8;left:5%;top:15%}.o2{background:#8b5cf6;right:5%;bottom:10%;animation-delay:2s}.o3{background:#ff9f1c;right:25%;top:35%;animation-delay:4s}@keyframes float{to{transform:translate(40px,60px) scale(1.15)}}.app{min-height:100vh;display:grid;place-items:center;padding:18px}.phone{width:min(420px,100%);min-height:760px;border:1px solid #ffffff24;border-radius:38px;background:linear-gradient(145deg,#101522cc,#060913ee);box-shadow:0 40px 100px #000, inset 0 0 0 1px #ffffff0d;position:relative;overflow:hidden}.phone:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,#ffffff18,transparent 18%,transparent 80%,#ffffff10);pointer-events:none}.status{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;color:#dce7ff;font-size:13px}.screen{display:none;padding:12px 22px 24px;animation:pop .35s ease}.screen.active{display:block}@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}.calc-head{display:flex;justify-content:space-between;align-items:center;margin:8px 0 22px}.hamb{width:42px;height:42px;border-radius:16px;border:1px solid #ffffff18;background:#ffffff08;color:#fff}.shield{color:#22ffc7;text-shadow:0 0 18px #22ffc7}.display{height:150px;display:flex;align-items:end;justify-content:end;font-size:54px;font-weight:300;letter-spacing:-2px;overflow:hidden;color:#f8fbff;text-shadow:0 0 20px #ffffff33}.keys{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.key{height:70px;border:0;border-radius:50%;font-size:25px;color:white;background:linear-gradient(145deg,#202938,#0b101b);box-shadow:inset 0 2px 4px #ffffff18,0 12px 22px #0008;transition:.16s;cursor:pointer}.key:active{transform:scale(.93)}.op{background:linear-gradient(145deg,#ffb21b,#ff7b00)}.danger{background:linear-gradient(145deg,#ff5b6c,#8e1528)}.soft{background:linear-gradient(145deg,#3a4458,#111827)}.wide{border-radius:38px;grid-column:span 2}.setup,.unlock{text-align:center;padding-top:40px}.logo{width:94px;height:94px;margin:0 auto 22px;border-radius:30px;display:grid;place-items:center;background:linear-gradient(135deg,#00ffc8,#6d5dfc);box-shadow:0 0 50px #00ffc877;font-size:36px}.title{font-size:30px;font-weight:800;background:linear-gradient(90deg,#22ffc7,#7aa7ff,#d76cff);-webkit-background-clip:text;color:transparent}.sub{color:#9ba9c5;margin:10px 0 28px;line-height:1.5}.input{width:100%;height:54px;border-radius:18px;border:1px solid #ffffff1f;background:#ffffff0b;color:#fff;padding:0 18px;margin:8px 0;font-size:16px;outline:none}.primary{width:100%;height:56px;border:0;border-radius:19px;margin-top:16px;color:#03130f;font-weight:800;font-size:16px;background:linear-gradient(135deg,#00ffc8,#7cff95);box-shadow:0 14px 35px #00ffc844}.note{margin-top:18px;padding:14px;border-radius:18px;background:#ffcc0012;border:1px solid #ffcc0044;color:#ffd990;font-size:13px}.finger{width:150px;height:150px;border-radius:50%;margin:28px auto;display:grid;place-items:center;border:2px solid #00ffc8;box-shadow:0 0 45px #00ffc877,inset 0 0 35px #00ffc822;animation:pulse 1.8s infinite}.finger i{font-size:64px;color:#00ffc8}@keyframes pulse{50%{transform:scale(1.06);box-shadow:0 0 70px #00ffc8}}.dots{display:flex;gap:16px;justify-content:center;margin-top:18px}.dots span{width:12px;height:12px;border-radius:50%;border:1px solid #fff}.vault{padding:4px 14px 20px}.vault-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.iconbtn{width:42px;height:42px;border-radius:15px;border:1px solid #ffffff18;background:#ffffff0b;color:#fff}.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px}.tab{min-width:74px;padding:12px 10px;border-radius:18px;background:#ffffff0b;border:1px solid #ffffff14;color:#9ba9c5;text-align:center;font-size:12px}.tab.active{background:linear-gradient(135deg,#00ffc833,#6d5dfc33);color:white;border-color:#00ffc855}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}.card{min-height:120px;padding:18px;border-radius:24px;background:linear-gradient(145deg,#ffffff13,#ffffff06);border:1px solid #ffffff16;box-shadow:0 18px 35px #0008}.card i{font-size:24px;color:#00ffc8}.card h3{margin-top:14px;font-size:15px}.card b{display:block;font-size:30px;margin-top:8px}.panel{display:none}.panel.active{display:block}.row{background:#ffffff0b;border:1px solid #ffffff12;border-radius:18px;padding:14px;margin:10px 0;display:flex;justify-content:space-between;gap:10px}.row small{color:#8da0c2}.fab{position:absolute;right:25px;bottom:26px;width:62px;height:62px;border:0;border-radius:50%;background:linear-gradient(135deg,#00ffc8,#75ff86);color:#03130f;font-size:24px;box-shadow:0 0 45px #00ffc888}.modal{display:none;position:absolute;inset:0;background:#000a;z-index:5;place-items:end center;padding:20px}.modal.active{display:grid}.sheet{width:100%;border-radius:28px;padding:22px;background:#101827;border:1px solid #ffffff20}.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.gallery img,.video{width:100%;height:92px;object-fit:cover;border-radius:16px;background:#ffffff10}.loading{position:absolute;inset:0;background:#050812ee;display:none;place-items:center;z-index:9}.loading.active{display:grid}.spin{width:70px;height:70px;border-radius:50%;border:4px solid #ffffff22;border-top-color:#00ffc8;animation:rot 1s linear infinite}@keyframes rot{to{transform:rotate(360deg)}}@media(max-width:430px){.app{padding:0}.phone{border-radius:0;min-height:100vh}.key{height:64px}.display{font-size:48px;height:135px}}
  

    /* Android app conversion fix: vault becomes full-screen, not tiny mockup */
    body.vault-mode{overflow:hidden}
    body.vault-mode .app{padding:0;display:block;min-height:100vh;width:100vw}
    body.vault-mode .phone{width:100vw;max-width:none;min-height:100vh;height:100vh;border-radius:0;border:0;background:linear-gradient(160deg,#0c1222 0%,#050812 52%,#081c20 100%);box-shadow:none;overflow:hidden}
    body.vault-mode .phone:before{background:radial-gradient(circle at 85% 14%,#00ffc822,transparent 22%),linear-gradient(120deg,#ffffff12,transparent 22%,transparent 78%,#ffffff0b)}
    body.vault-mode .status{padding:14px 18px 8px;font-size:13px}
    body.vault-mode #vault.screen{height:calc(100vh - 39px);display:none;padding:10px 16px 92px;overflow-y:auto;animation:vaultIn .35s ease}
    body.vault-mode #vault.screen.active{display:block}
    @keyframes vaultIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    body.vault-mode .vault-top{position:sticky;top:0;z-index:3;margin:0 -16px 14px;padding:12px 16px 14px;background:linear-gradient(180deg,#07101eee 70%,transparent);backdrop-filter:blur(18px)}
    body.vault-mode .vault-top h2{font-size:27px;letter-spacing:-.8px;background:linear-gradient(90deg,#fff,#00ffc8);-webkit-background-clip:text;color:transparent}
    body.vault-mode .tabs{position:fixed;left:10px;right:10px;bottom:12px;z-index:4;gap:8px;padding:8px;border-radius:28px;background:#07101ed9;border:1px solid #ffffff18;box-shadow:0 18px 50px #000b, inset 0 0 0 1px #ffffff0b;backdrop-filter:blur(20px);overflow-x:auto}
    body.vault-mode .tab{flex:1;min-width:64px;padding:11px 8px;border-radius:21px;font-size:11px;background:#ffffff08;box-shadow:inset 0 1px 0 #ffffff12}
    body.vault-mode .tab i{font-size:18px;margin-bottom:4px;color:#00ffc8}
    body.vault-mode .tab.active{background:linear-gradient(135deg,#00ffc833,#6d5dfc55);box-shadow:0 0 22px #00ffc822;color:#fff}
    body.vault-mode .grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin:12px 0 18px}
    body.vault-mode .card{min-height:145px;padding:20px;border-radius:28px;background:linear-gradient(145deg,#ffffff16,#ffffff08);border-color:#ffffff18;box-shadow:0 16px 36px #0008, inset 0 1px 0 #ffffff17}
    body.vault-mode .card i{font-size:27px;padding:12px;border-radius:16px;background:#00ffc814;box-shadow:0 0 25px #00ffc822}
    body.vault-mode .card h3{font-size:16px;margin-top:15px;color:#dfe9ff}
    body.vault-mode .card b{font-size:36px;line-height:1;margin-top:10px}
    body.vault-mode .row{border-radius:24px;padding:17px 15px;margin:12px 0;background:linear-gradient(145deg,#ffffff12,#ffffff07);box-shadow:0 12px 28px #0006}
    body.vault-mode .row b{font-size:16px} body.vault-mode .row small{font-size:13px;line-height:1.5}
    body.vault-mode .gallery{grid-template-columns:repeat(3,1fr);gap:11px}.body{}
    body.vault-mode .gallery img,body.vault-mode .video{height:118px;border-radius:22px;box-shadow:0 14px 26px #0008}
    body.vault-mode .fab{position:fixed;right:20px;bottom:96px;width:66px;height:66px;border-radius:24px;z-index:6;background:linear-gradient(135deg,#00ffc8,#75ff86);box-shadow:0 0 38px #00ffc877,0 18px 36px #0009}
    body.vault-mode .modal{position:fixed;align-items:end;padding:14px}.modal.active{display:grid}
    body.vault-mode .sheet{border-radius:30px 30px 22px 22px;background:#0d1524f4;box-shadow:0 -30px 80px #000b;backdrop-filter:blur(20px)}
    body.vault-mode .sub{font-size:14px;color:#9eb0d0}
    @media(min-width:700px){body.vault-mode .phone{width:min(520px,100vw);margin:0 auto;border-left:1px solid #ffffff14;border-right:1px solid #ffffff14}body.vault-mode .tabs{left:calc(50% - 250px);right:calc(50% - 250px)}body.vault-mode .fab{right:calc(50% - 240px)}}


    /* FINAL POLISH: Android APK full-screen feel */
    @media(max-width:700px){
      html,body{height:100%;overflow:hidden;background:#050812;}
      .app{padding:0;display:block;width:100vw;height:100vh;min-height:100vh;}
      .phone{width:100vw;max-width:none;height:100vh;min-height:100vh;border-radius:0;border:0;box-shadow:none;background:linear-gradient(160deg,#0c1324 0%,#050812 54%,#071a20 100%);}
      .phone:before{background:radial-gradient(circle at 92% 10%,#00ffc820,transparent 24%),linear-gradient(120deg,#ffffff12,transparent 25%,transparent 72%,#ffffff0b)}
      .status{padding:14px 20px 6px;font-size:13px;}
      #calc.screen.active{height:calc(100vh - 38px);display:flex;flex-direction:column;padding:10px 22px 28px;}
      .calc-head{margin:4px 0 10px;}
      .display{height:auto;flex:1;min-height:155px;font-size:60px;align-items:flex-end;padding-bottom:18px;}
      .keys{gap:13px;padding-bottom:8px;}
      .key{height:clamp(62px,15.5vw,76px);font-size:25px;box-shadow:inset 0 2px 4px #ffffff18,0 10px 22px #0009;}
      #setup.screen.active,#unlock.screen.active{height:calc(100vh - 38px);display:flex;flex-direction:column;justify-content:center;padding:22px;}
      .vault{padding:0;}
      body.vault-mode .status{padding:13px 18px 5px;background:#07101ebb;backdrop-filter:blur(16px);}
      body.vault-mode #vault.screen.active{height:calc(100vh - 36px);padding:8px 16px 102px;overflow-y:auto;}
      body.vault-mode .vault-top{margin:0 -16px 12px;padding:12px 16px 12px;}
      body.vault-mode .vault-top h2{font-size:28px;}
      body.vault-mode .grid{gap:13px;margin:10px 0 16px;}
      body.vault-mode .card{min-height:132px;padding:17px;border-radius:26px;}
      body.vault-mode .card b{font-size:34px;}
      body.vault-mode .tabs{left:8px;right:8px;bottom:10px;padding:7px;border-radius:25px;}
      body.vault-mode .tab{min-width:0;padding:10px 4px;font-size:10px;}
      body.vault-mode .fab{right:18px;bottom:91px;width:64px;height:64px;border-radius:23px;}
      body.vault-mode .panel{padding-bottom:10px;}
      body.vault-mode .sub{margin-top:8px;}
    }

    @media(max-width:380px){
      #calc.screen.active{padding:8px 18px 22px;}
      .display{font-size:52px;min-height:130px;}
      .keys{gap:10px;}
      .key{height:60px;font-size:22px;}
      body.vault-mode #vault.screen.active{padding-left:12px;padding-right:12px;}
      body.vault-mode .card{min-height:120px;padding:15px;}
      body.vault-mode .card b{font-size:30px;}
    }

    @media(min-width:701px){
      .phone{width:min(430px,100%);}
    }


    /* FINAL UPDATE: balanced calculator position + clean hidden mode */
    .calc-head{justify-content:flex-end;}
    .calc-head .hamb{display:none!important;}
    .display{padding-right:6px;}
    @media(max-width:700px){
      #calc.screen.active{padding:10px 22px 24px;}
      .calc-head{margin:2px 0 6px;min-height:44px;justify-content:flex-end;}
      .display{flex:0 0 auto;height:clamp(205px,34vh,285px);min-height:0;font-size:60px;align-items:flex-end;padding-bottom:14px;padding-right:8px;}
      .keys{margin-top:0;gap:12px;padding-bottom:6px;}
      .key{height:clamp(61px,15vw,74px);}
    }
    @media(max-width:380px){
      .display{height:clamp(175px,31vh,235px);font-size:52px;padding-bottom:10px;}
      .calc-head{min-height:38px;margin:0 0 4px;}
      .keys{gap:10px;}
      .key{height:58px;}
    }
    @media(min-height:820px) and (max-width:700px){
      .display{height:clamp(240px,35vh,310px);}
    }
    body.vault-mode .vault-top .iconbtn{color:#00ffc8;box-shadow:0 0 22px #00ffc822;}

  </style>
</head>
<body>
<div class="bg"></div><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="app"><div class="phone">
  <div class="status"><span>9:41</span><span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-three-quarters"></i></span></div>
  <div class="loading" id="loading"><div><div class="spin"></div><p style="margin-top:18px;color:#00ffc8">Unlocking secure vault...</p></div></div>

  <section id="setup" class="screen setup">
    <div class="logo"><i class="fa-solid fa-shield-halved"></i></div><h1 class="title">Create Vault</h1><p class="sub">Set your secret calculator password.</p>
    <input class="input" id="newPass" type="password" placeholder="Create password"><input class="input" id="newPass2" type="password" placeholder="Confirm password">
    <button class="primary" onclick="setupPass()">Create Secure Vault</button><div class="note">Data saves only in this browser/device.</div>
  </section>

  <section id="calc" class="screen active">
    <div class="calc-head"><i class="fa-solid fa-shield shield"></i></div>
    <div class="display" id="display">0</div>
    <div class="keys">
      <button class="key danger" onclick="clr()">AC</button><button class="key soft" onclick="tap('+/-')">+/-</button><button class="key soft" onclick="tap('%')">%</button><button class="key op" onclick="tap('/')">÷</button>
      <button class="key" onclick="tap('7')">7</button><button class="key" onclick="tap('8')">8</button><button class="key" onclick="tap('9')">9</button><button class="key op" onclick="tap('*')">×</button>
      <button class="key" onclick="tap('4')">4</button><button class="key" onclick="tap('5')">5</button><button class="key" onclick="tap('6')">6</button><button class="key op" onclick="tap('-')">−</button>
      <button class="key" onclick="tap('1')">1</button><button class="key" onclick="tap('2')">2</button><button class="key" onclick="tap('3')">3</button><button class="key op" onclick="tap('+')">+</button>
      <button class="key soft" onclick="back()"><i class="fa-solid fa-delete-left"></i></button><button class="key" onclick="tap('0')">0</button><button class="key" onclick="tap('.')">.</button><button class="key op" onclick="equal()">=</button>
    </div>
  </section>

  <section id="unlock" class="screen unlock">
    <h1 class="title">Secure Unlock</h1><p class="sub">Password accepted. Touch to open vault.</p><div class="dots"><span></span><span></span><span></span><span></span></div>
    <div class="finger" onclick="openVault()"><i class="fa-solid fa-fingerprint"></i></div><button class="primary" onclick="openVault()">Unlock Vault</button>
  </section>

  <section id="vault" class="screen vault">
    <div class="vault-top"><h2>My Vault</h2><div><button class="iconbtn" onclick="lock()" title="Return to Calculator"><i class="fa-solid fa-calculator"></i></button></div></div>
    <div class="tabs" id="tabs"></div>
    <div class="grid"><div class="card"><i class="fa-solid fa-note-sticky"></i><h3>Notes</h3><b id="nCount">0</b></div><div class="card"><i class="fa-solid fa-key"></i><h3>Passwords</h3><b id="pCount">0</b></div><div class="card"><i class="fa-solid fa-image"></i><h3>Gallery</h3><b id="gCount">0</b></div><div class="card"><i class="fa-solid fa-video"></i><h3>Videos</h3><b id="vCount">0</b></div></div>
    <div id="notes" class="panel active"></div><div id="passwords" class="panel"></div><div id="gallery" class="panel"><div class="gallery" id="galleryGrid"></div><input id="imgUp" type="file" accept="image/*" hidden onchange="saveFile(event,'images')"></div><div id="videos" class="panel"><div id="videoList"></div><input id="vidUp" type="file" accept="video/*" hidden onchange="saveFile(event,'videos')"></div><div id="files" class="panel"></div>
    <button class="fab" onclick="addAction()"><i class="fa-solid fa-plus"></i></button>
  </section>

  <div class="modal" id="modal"><div class="sheet"><h3 id="modalTitle">Add</h3><input class="input" id="field1" placeholder="Title"><input class="input" id="field2" placeholder="Value / Password / Note"><button class="primary" onclick="saveText()">Save</button><button class="iconbtn" style="margin-top:12px;width:100%" onclick="closeModal()">Cancel</button></div></div>
</div></div>
<script>
const $=id=>document.getElementById(id);let input='0',active='notes',modalType='notes';const tabData=[['notes','Notes','fa-note-sticky'],['passwords','Passwords','fa-key'],['gallery','Gallery','fa-image'],['videos','Videos','fa-video'],['files','Files','fa-folder']];
function show(id){document.body.classList.toggle('vault-mode', id==='vault');document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}function renderTabs(){tabs.innerHTML=tabData.map(t=>`<div class="tab ${t[0]==active?'active':''}" onclick="setTab('${t[0]}')"><i class="fa-solid ${t[2]}"></i><br>${t[1]}</div>`).join('')}function setTab(t){active=t;document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));$(t).classList.add('active');renderTabs();render()}
function tap(x){if(input==='0'&&!['.','+','-','*','/','%'].includes(x))input=x;else input+=x;display.textContent=input.replace('*','×').replace('/','÷')}function clr(){input='0';display.textContent='0'}function back(){input=input.length>1?input.slice(0,-1):'0';display.textContent=input}function equal(){let pass=localStorage.vaultPass;if(input===pass){clr();show('unlock');return}try{input=String(Function('return '+input.replace('%','/100'))());display.textContent=input}catch{clr()}}
function setupPass(){if(newPass.value.length<4)return alert('Password minimum 4 characters');if(newPass.value!==newPass2.value)return alert('Password not match');localStorage.vaultPass=newPass.value;show('calc')}function openVault(){loading.classList.add('active');setTimeout(()=>{loading.classList.remove('active');show('vault');render()},900)}function lock(){show('calc');clr()}
function data(k){return JSON.parse(localStorage[k]||'[]')}function put(k,v){localStorage[k]=JSON.stringify(v)}function addAction(){if(active==='gallery')return imgUp.click();if(active==='videos')return vidUp.click();if(active==='files')return alert('Private files demo: use Gallery/Videos upload in browser localStorage.');modalType=active;modalTitle.textContent='Add '+active;modal.classList.add('active')}function closeModal(){modal.classList.remove('active');field1.value='';field2.value=''}function saveText(){let arr=data(modalType);arr.push({id:Date.now(),a:field1.value,b:field2.value});put(modalType,arr);closeModal();render()}function del(k,id){put(k,data(k).filter(x=>x.id!==id));render()}function saveFile(e,k){let file=e.target.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{let arr=data(k);arr.push({id:Date.now(),name:file.name,src:r.result});put(k,arr);render()};r.readAsDataURL(file)}
function render(){renderTabs();nCount.textContent=data('notes').length;pCount.textContent=data('passwords').length;gCount.textContent=data('images').length;vCount.textContent=data('videos').length;notes.innerHTML=data('notes').map(x=>`<div class="row"><div><b>${x.a||'Secret Note'}</b><br><small>${x.b||''}</small></div><button class="iconbtn" onclick="del('notes',${x.id})"><i class="fa-solid fa-trash"></i></button></div>`).join('')||'<p class="sub">No notes yet</p>';passwords.innerHTML=data('passwords').map(x=>`<div class="row"><div><b>${x.a||'Account'}</b><br><small>${x.b||''}</small></div><button class="iconbtn" onclick="del('passwords',${x.id})"><i class="fa-solid fa-trash"></i></button></div>`).join('')||'<p class="sub">No passwords yet</p>';galleryGrid.innerHTML=data('images').map(x=>`<img src="${x.src}" onclick="window.open('${x.src}')">`).join('')||'<p class="sub">No photos yet</p>';videoList.innerHTML=data('videos').map(x=>`<div class="row" style="display:block"><b>${x.name}</b><video class="video" controls src="${x.src}"></video><button class="iconbtn" onclick="del('videos',${x.id})"><i class="fa-solid fa-trash"></i></button></div>`).join('')||'<p class="sub">No videos yet</p>';files.innerHTML='<div class="note">Demo privacy: all saved only in this browser localStorage. Clearing browser data deletes vault data.</div>'}
window.onload=()=>{if(!localStorage.vaultPass)show('setup');renderTabs();render()}
</script>
</body>
</html>
